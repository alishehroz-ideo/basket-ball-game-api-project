<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Web Player | {{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e0e12;
      }
      #unity-container {
        position: fixed;
        inset: 0;
        background: #0e0e12;   /* clean solid backdrop — no hero panel (matches LapsFuse) */
      }
      #unity-canvas {
        display: block;
        position: absolute;
        background: transparent;
      }
      #unity-logo {
        width: 180px;
        height: 180px;
        margin: 0 auto 12px;
        background: url('TemplateData/game-icon.jpg') center / contain no-repeat;
      }
      /* Custom rounded progress bar — overrides PNG images from style.css */
      #unity-progress-bar-empty {
        width: 300px;
        height: 18px;
        background: #d9d9d9 !important;
        background-image: none !important;
        border-radius: 9px;
        overflow: hidden;
        margin: 12px auto 0;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #1C3A5B !important;
        background-image: none !important;
        margin-top: 0 !important;
        border-radius: 9px;
        transition: width 0.1s ease;
      }
      #unity-progress-percent {
        text-align: center;
        color: #F2F2F2;
        font-size: 14px;
        font-family: arial, sans-serif;
        margin-top: 6px;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
      }
      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        transform: translate(-50%);
        background: white;
        padding: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-progress-percent">0%</div>
      </div>
      <div id="unity-warning"> </div>

    </div>
    <script>
      // ── Responsive letterbox ────────────────────────────────────────────────
      var GAME_ASPECT = {{{ WIDTH }}} / {{{ HEIGHT }}};

      function resizeCanvas() {
        var canvas = document.getElementById('unity-canvas');
        var availW = window.innerWidth;
        var availH = window.innerHeight;
        var w, h;
        if (availW / availH > GAME_ASPECT) {
          h = availH; w = Math.round(h * GAME_ASPECT);
        } else {
          w = availW; h = Math.round(w / GAME_ASPECT);
        }
        canvas.style.width  = w + 'px';
        canvas.style.height = h + 'px';
        canvas.style.left   = Math.round((availW - w) / 2) + 'px';
        canvas.style.top    = Math.round((availH - h) / 2) + 'px';
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // ── Unity banner helper ─────────────────────────────────────────────────
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // ── Unity build config ──────────────────────────────────────────────────
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl:      buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
        codeUrl:      buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if USE_THREADS
        workerUrl:    buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl:   buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName:    {{{ JSON.stringify(COMPANY_NAME) }}},
        productName:    {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        matchWebGLToCanvasSize: true,
        showBanner: unityShowBanner,
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      function setLoadProgress(p) {
        document.querySelector("#unity-progress-bar-full").style.width = Math.round(p * 100) + "%";
        document.querySelector("#unity-progress-percent").innerText = Math.round(p * 100) + "%";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(document.querySelector("#unity-canvas"), config, setLoadProgress)
        .then((unityInstance) => {
          setLoadProgress(1);
          document.querySelector("#unity-loading-bar").style.display = "none";
          var logo = document.querySelector("#unity-logo");
          if (logo) { logo.style.display = "none"; logo.style.visibility = "hidden"; logo.style.opacity = "0"; }

          resizeCanvas();

          // ── Bridge: tell the parent the game is ready ─────────────────────
          window.parent.postMessage({ type: 'game:ready' }, '*');

          // ── Bridge: listen for campaign:init from parent ──────────────────
          window.addEventListener('message', function(event) {
            var msg = event.data;
            if (!msg || msg.type !== 'campaign:init') return;
            var cfg = msg.config || {};
            if (cfg.ballImage) {
              unityInstance.SendMessage('Bridge', 'SetBallImage', cfg.ballImage);
            }
          });

          // ── Self-test: ?ballTest=1 generates a solid-color circle ─────────
          if (new URLSearchParams(window.location.search).get('ballTest') === '1') {
            var size = 256;
            var c = document.createElement('canvas');
            c.width = c.height = size;
            var ctx = c.getContext('2d');
            // Hot-pink circle on transparent background — easy to spot
            ctx.clearRect(0, 0, size, size);
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2 - 4, 0, Math.PI * 2);
            ctx.fillStyle = '#FF2D78';
            ctx.fill();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 8;
            ctx.stroke();
            unityInstance.SendMessage('Bridge', 'SetBallImage', c.toDataURL('image/png'));
          }

        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
